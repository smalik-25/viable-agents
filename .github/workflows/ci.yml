name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# A new push kills the old run's jobs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned to the version on the dev machine so a CI failure has one fewer
  # variable. Bump both together.
  UV_VERSION: "0.11.27"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by SHA, not tag: v3 through v6 of actions/checkout
      # were all re-tagged on 2026-07-20, so a floating tag is a live
      # supply-chain exposure.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true

      # --locked fails on a stale lockfile rather than silently re-resolving.
      - run: uv sync --locked

      - name: ruff check
        run: uv run ruff check --output-format=github .
      - name: ruff format
        run: uv run ruff format --check --diff .
      - name: mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    env:
      # Ordering-sensitive code must not depend on set iteration order, and the
      # Phase 9 claim is that runs reproduce from seeds.
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked

      # No secrets and no live API calls, ever. Tests that touch a real API
      # carry the `live` marker and are deselected here.
      - name: pytest
        run: uv run pytest -m "not live"

  # Phase 1 adds a `postgres:16` service container with DATABASE_URL, an
  # `alembic upgrade head` step, a `make kernel-budget` step, and an assertion
  # that the db-marked suite actually ran rather than skipping.
